---
- name: Configure Yandex Cloud DevOps VM
  hosts: yc
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
        state: present

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Allow Zabbix web
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Install Docker
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create project directory
      ansible.builtin.file:
        path: /opt/devops-lab
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Create scripts directory
      ansible.builtin.file:
        path: /opt/devops-lab/scripts
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy Zabbix PostgreSQL backup script
      ansible.builtin.copy:
        src: ../scripts/backup-zabbix-postgres.sh
        dest: /opt/devops-lab/scripts/backup-zabbix-postgres.sh
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Configure daily Zabbix PostgreSQL backup cron
      ansible.builtin.cron:
        name: "Zabbix PostgreSQL backup"
        user: ubuntu
        minute: "0"
        hour: "3"
        job: "/opt/devops-lab/scripts/backup-zabbix-postgres.sh >> /opt/devops-lab/backups/zabbix-postgres/backup.log 2>&1"    
