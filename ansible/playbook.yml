---
- name: Configure Yandex Cloud DevOps VM
  hosts: yc
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
        state: present

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Allow Zabbix web
      community.general.ufw:
        rule: allow
        port: "8080"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Install Docker
      ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: ubuntu
        groups: docker
        append: true

    - name: Create project directory
      ansible.builtin.file:
        path: /opt/devops-lab
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
